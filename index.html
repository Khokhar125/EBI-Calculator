<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBI/EPEF Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      background-color: #f7f7f7;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .header img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 10px;
      border: 2px solid #ccc;
    }

    h1 {
      font-size: 18px;
      color: #333;
      text-align: center;
    }

    h2 {
      color: #333;
      margin-bottom: 2px;
    }

    .subheading {
      font-size: 14px;
      color: #666;
      margin-top: 0;
      margin-bottom: 15px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 8px;
      font-weight: bold;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 6px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      position: sticky;
      bottom: 10px;
    }

    button:hover {
      background-color: #45a049;
    }

    #result {
      margin-top: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #222;
    }

    .container {
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.12);
      max-width: 520px;
      width: 95%;
      margin: auto;
      text-align: center;
    }

    @media (max-width: 480px) {
      .container div[style*="display: flex"] {
        gap: 8px;
      }
    }

    @media (max-width: 600px) {
      .row {
        flex-direction: column;
      }

      h1 {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="mamu_khurrum_pic.jpg" alt="Creator Picture">
    <h1>Dr. Malik Khurrum Shahzad Khokhar is the Creator of this European Broiler Index (EBI) Calculator.</h1>
  </div>

  <div class="container">

    <h2>EBI Calculator</h2>
    <p class="subheading">(European Broiler Index)</p>

    <!-- Chicks & Mortality -->
    <div style="display: flex; gap: 10px;">
      <div style="flex: 1;">
        <label>Total Chicks:</label>
        <input type="number" id="total_chicks" placeholder="e.g. 30000" oninput="updateSurvivalRate(); updateAvgWeight();">
      </div>

      <div style="flex: 1;">
        <label>Total Mortality:</label>
        <input type="number" id="total_mortality" placeholder="e.g. 900" oninput="updateSurvivalRate(); updateAvgWeight();">
      </div>
    </div>

    <label>Survival Rate (%):</label>
    <input type="number" id="survival_rate" readonly>

    <!-- Total Weight -->
    <label>Total Weight (kg):</label>
    <input type="number" id="total_weight_all" placeholder="e.g. 80000" oninput="updateAvgWeight()">

    <!-- Avg Weight -->
    <label>Average Weight (g):</label>
    <input type="number" id="total_weight" readonly>

    <!-- Sold Day -->
    <label>Sold At Day:</label>
    <input type="number" id="sold_at_day" placeholder="e.g. 35" oninput="updateAvgWeightGain()">

    <!-- Avg Weight Gain -->
    <label>Average Weight Gain (g/day):</label>
    <input type="number" id="avg_weight_gain" readonly>

    <!-- FCR -->
    <label>Feed Conversion Ratio:</label>
    <input type="number" step="0.01" id="feed_conversion" placeholder="e.g. 1.6">

    <button onclick="calculateEBI()">Calculate EBI</button>

    <div id="result"></div>

  </div>

<script>

  function updateSurvivalRate() {
    let chicks = parseFloat(document.getElementById("total_chicks").value);
    let mortality = parseFloat(document.getElementById("total_mortality").value);

    if (!isNaN(chicks) && chicks > 0 && !isNaN(mortality)) {
      let survival = 100 - ((mortality / chicks) * 100);
      document.getElementById("survival_rate").value = survival.toFixed(2);
    } else {
      document.getElementById("survival_rate").value = "";
    }
  }

  function updateAvgWeight() {
    let totalWeightKg = parseFloat(document.getElementById("total_weight_all").value);
    let chicks = parseFloat(document.getElementById("total_chicks").value);
    let mortality = parseFloat(document.getElementById("total_mortality").value);

    if (!isNaN(totalWeightKg) && !isNaN(chicks) && !isNaN(mortality)) {
      let liveBirds = chicks - mortality;

      if (liveBirds > 0) {
        let avgWeight = (totalWeightKg * 1000) / liveBirds;
        document.getElementById("total_weight").value = avgWeight.toFixed(2);

        updateAvgWeightGain();
      }
    } else {
      document.getElementById("total_weight").value = "";
    }
  }

  function updateAvgWeightGain() {
    let weight = parseFloat(document.getElementById("total_weight").value);
    let days = parseFloat(document.getElementById("sold_at_day").value);

    if (!isNaN(weight) && !isNaN(days) && days > 0) {
      let gain = weight / days;
      document.getElementById("avg_weight_gain").value = gain.toFixed(2);
    } else {
      document.getElementById("avg_weight_gain").value = "";
    }
  }

  function calculateEBI() {
    let gain = parseFloat(document.getElementById("avg_weight_gain").value);
    let survival = parseFloat(document.getElementById("survival_rate").value);
    let fcr = parseFloat(document.getElementById("feed_conversion").value);

    if (isNaN(gain) || isNaN(survival) || isNaN(fcr)) {
      document.getElementById("result").innerText = "Please enter all values.";
      return;
    }

    fcr = 50 / fcr;
    let ebi = ((gain * survival) / fcr) / 10;

    document.getElementById("result").innerText =
      "European Broiler Index (EBI): " + ebi.toFixed(1);
  }

</script>

</body>
</html>
