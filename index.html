<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBI/EPEF Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
	  margin: 10px;
      background-color: #f7f7f7;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .header img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 10px;
      border: 2px solid #ccc;
    }
    h1 {
      font-size: 18px;
      color: #333;
      text-align: center;
    }
	.subheading {
    font-weight: bold;
    color: #333;
    }
    h2 {
      color: #333;
      margin-bottom: 2px;
    }
    .subheading {
      font-size: 14px;
      color: #666;
      margin-top: 0;
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-top: 8px;
      font-weight: bold;
      text-align: left;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
	  margin-bottom: 6px;
    }
    button {
	  margin-top: 15px;
	  padding: 10px;
	  width: 100%;
	  background-color: #4CAF50;
	  color: white;
	  border: none;
	  border-radius: 5px;
	  font-size: 16px;
	  cursor: pointer;
	  position: sticky;
	  bottom: 10px;
	}
    button:hover {
      background-color: #45a049;
    }
    #result {
      margin-top: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #222;
    }
	
	.container {
	  background: #fff;
	  padding: 16px;
	  border-radius: 12px;
	  box-shadow: 0px 4px 12px rgba(0,0,0,0.12);
	  max-width: 520px;
	  width: 95%;
	  margin: auto;
	  text-align: center;
    }
	
	@media (max-width: 480px) {
		.container div[style*="display: flex"] {
		gap: 8px;
	}
}

    @media (max-width: 600px) {
      .row {
        flex-direction: column;
      }

      h1 {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="mamu_khurrum_pic.jpg" alt="Creator Picture">
    <h1>Dr. Malik Khurrum Shahzad Khokhar is the Creator of this European Broiler Index (EBI) Calculator.</h1>
  </div>

  <div class="container" style="padding: 20px;">
	  <h2>EBI Calculator</h2>
	  <p class="subheading"><b>(European Broiler Index)</b></p>

	  <!-- Survival Rate Section -->
	  <div style="display: flex; gap: 10px;">
		<div style="flex: 1; margin-right: 15px;">
		  <label for="total_chicks">Total Chicks:</label>
		  <input type="number" id="total_chicks" placeholder="e.g. 30000" oninput="updateSurvivalRate()">
		</div>
		<div style="flex: 1;">
		  <label for="total_mortality">Total Mortality:</label>
		  <input type="number" id="total_mortality" placeholder="e.g. 900" oninput="updateSurvivalRate()">
		</div>
	  </div>

	  <label for="survival_rate">Survival Rate (%):</label>
	  <input type="number" id="survival_rate" placeholder="Auto calculated" readonly>

	  <!-- Average Weight Gain Section -->
	  <div style="display: flex; gap: 10px;">
		<div style="flex: 1; margin-right: 15px;">
		  <label for="total_weight">Average Weight (g):</label>
		  <input type="number" id="total_weight" placeholder="e.g. 2800" oninput="updateAvgWeightGain()">
		</div>
		<div style="flex: 1;">
		  <label for="sold_at_day">Sold At Day:</label>
		  <input type="number" id="sold_at_day" placeholder="e.g. 35" oninput="updateAvgWeightGain()">
		</div>
	  </div>

	  <label for="avg_weight_gain">Average Weight Gain (g/day):</label>
	  <input type="number" id="avg_weight_gain" placeholder="Auto calculated" readonly>

	  <!-- Feed Conversion -->
	  <label for="feed_conversion">Feed Conversion Ratio:</label>
	  <input type="number" step="0.01" id="feed_conversion" placeholder="e.g. 30.0">

	  <button onclick="calculateEBI()">Calculate EBI</button>

	  <div id="result"></div>
  </div>

<script>
  // Auto Survival Rate
  function updateSurvivalRate() {
    let total_chicks = parseFloat(document.getElementById("total_chicks").value);
    let total_mortality = parseFloat(document.getElementById("total_mortality").value);

    if (!isNaN(total_chicks) && total_chicks > 0 && !isNaN(total_mortality)) {
      let survival_rate = 100 - ((total_mortality / total_chicks) * 100);
      document.getElementById("survival_rate").value = survival_rate.toFixed(2);
    } else {
      document.getElementById("survival_rate").value = "";
    }
  }

  // Auto Avg Weight Gain
  function updateAvgWeightGain() {
    let total_weight = parseFloat(document.getElementById("total_weight").value);
    let sold_at_day = parseFloat(document.getElementById("sold_at_day").value);

    if (!isNaN(total_weight) && !isNaN(sold_at_day) && sold_at_day > 0) {
      let avg_weight_gain = total_weight / sold_at_day;
      document.getElementById("avg_weight_gain").value = avg_weight_gain.toFixed(2);
    } else {
      document.getElementById("avg_weight_gain").value = "";
    }
  }

  // EBI Calculation
  function calculateEBI() {
    let avg_weight_gain = parseFloat(document.getElementById("avg_weight_gain").value);
    let survival_rate = parseFloat(document.getElementById("survival_rate").value);
    let feed_conversion = parseFloat(document.getElementById("feed_conversion").value);

    if (isNaN(avg_weight_gain) || isNaN(survival_rate) || isNaN(feed_conversion)) {
      document.getElementById("result").innerText = "Please enter all values.";
      return;
    }

    feed_conversion = 50 / feed_conversion;
    let ebi = ((avg_weight_gain * survival_rate) / feed_conversion) / 10;
    const resultDiv = document.getElementById("result");
    resultDiv.innerText = `European Broiler Index (EBI): ${ebi.toFixed(1)}`;
    resultDiv.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }
</script>


</body>
</html>
